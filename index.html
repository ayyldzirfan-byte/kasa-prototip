<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f8f3ea" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kasa" />
    <title>Ev Kasası Prototip</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./kasa-extra.css" />
  </head>
  <body>
    <div class="phone-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Geçici isim</p>
          <h1>Kasa</h1>
        </div>
        <button class="ghost-button" id="demoReset" type="button" aria-label="Kasayı sıfırla">
          Sıfırla
        </button>
      </header>

      <main id="app" class="app-view" aria-live="polite"></main>

      <nav class="tabbar" aria-label="Ana menü">
        <button class="tab active" data-view="home" type="button">
          <span>Ana</span>
        </button>
        <button class="tab tab-primary" data-view="add" type="button">
          <span>Ekle</span>
        </button>
        <button class="tab" data-view="calendar" type="button">
          <span>Takvim</span>
        </button>
        <button class="tab" data-view="report" type="button">
          <span>Rapor</span>
        </button>
        <button class="tab" data-view="group" type="button">
          <span>Projeler</span>
        </button>
      </nav>

      <div class="update-stamp" aria-label="Son güncelleme">Güncellendi 02.06.2026 01:34</div>
    </div>

    <script src="./app-state.js"></script>
    <script src="./app-core.js"></script>
    <script src="./app-views.js"></script>
    <script src="./app-bind.js"></script>
    <script src="./app-model.js"></script>
    <script src="./app-init.js"></script>
  </body>
</html>
