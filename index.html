<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f7f5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kasa" />
    <title>Kasa Prototip</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./kasa-extra.css" />
  </head>
  <body>
    <div class="phone-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Geçici isim</p>
          <h1>Kasa</h1>
        </div>
        <button class="ghost-button" id="demoReset" type="button" aria-label="Kasayı sıfırla">
          Sıfırla
        </button>
      </header>

      <main id="app" class="app-view" aria-live="polite"></main>

      <nav class="tabbar" aria-label="Ana menü">
        <button class="tab active" data-view="home" type="button">
          <span>Kasa</span>
        </button>
        <button class="tab" data-view="movements" type="button">
          <span>Hareketler</span>
        </button>
        <button class="tab" data-view="group" type="button">
          <span>Bütçeler</span>
        </button>
        <button class="tab" data-view="calendar" type="button">
          <span>Takvim</span>
        </button>
        <button class="tab" data-view="report" type="button">
          <span>Rapor</span>
        </button>
      </nav>

      <div class="update-stamp" aria-label="Son güncelleme">Güncellendi 06.06.2026 00:07</div>
    </div>

    <script src="./cloud-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="./app-state.js"></script>
    <script src="./app-core.js"></script>
    <script src="./app-views.js"></script>
    <script src="./app-bind.js"></script>
    <script src="./app-model.js"></script>
    <script src="./app-cloud.js"></script>
    <script src="./app-blocks.js"></script>
    <script src="./app-product-pass.js"></script>
    <script src="./app-init.js"></script>
  </body>
</html>
